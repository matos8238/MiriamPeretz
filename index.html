<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎂 יום הולדת מרים פרץ – משחק הטריוויה!</title>

  <!-- Google Fonts – Heebo (Hebrew) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['Heebo', 'sans-serif'] } } }
    };
  </script>

  <!-- Alpine.js CDN -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>

  <!-- canvas-confetti CDN -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

  <style>
    /* ── Base ── */
    body { font-family: 'Heebo', sans-serif; }
    [x-cloak] { display: none !important; }

    /* ── Keyframe animations ── */
    @keyframes wiggle {
      0%, 100% { transform: rotate(0deg); }
      25%       { transform: rotate(-14deg); }
      75%       { transform: rotate(14deg); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-10px); }
    }
    @keyframes spin-star {
      0%   { transform: rotate(0deg)   scale(1);   }
      50%  { transform: rotate(180deg) scale(1.4); }
      100% { transform: rotate(360deg) scale(1);   }
    }
    @keyframes pulse-glow {
      0%, 100% { transform: scale(1);    box-shadow: 0 0 0 0   rgba(251,191,36,0.5); }
      50%       { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(251,191,36,0); }
    }
    @keyframes pop-in {
      from { opacity: 0; transform: scale(0.82) translateY(16px); }
      to   { opacity: 1; transform: scale(1)    translateY(0);    }
    }
    @keyframes bounce-in {
      0%   { opacity: 0; transform: scale(0.5);  }
      60%  { opacity: 1; transform: scale(1.15); }
      80%  { transform: scale(0.95); }
      100% { transform: scale(1);    }
    }

    /* ── Animation utility classes ── */
    .anim-wiggle      { animation: wiggle      2.5s ease-in-out infinite; }
    .anim-float       { animation: float       3s   ease-in-out infinite; }
    .anim-pulse-glow  { animation: pulse-glow  2.2s ease-in-out infinite; display: inline-block; border-radius: 0.5rem; padding: 0.1rem 0.4rem; }
    .anim-pop-in      { animation: pop-in      0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    .anim-bounce-in   { animation: bounce-in   0.6s  cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

    /* ── Decorative floating stars ── */
    .star {
      position: absolute;
      color: #fde047;
      pointer-events: none;
      user-select: none;
      animation: spin-star linear infinite;
    }
  </style>
</head>

<body class="min-h-screen bg-gradient-to-br from-sky-100 via-white to-amber-50">

<!-- ════════════════════════════════════════════════════════════
     Alpine.js root — wraps the entire app
════════════════════════════════════════════════════════════ -->
<div x-data="triviaGame()" x-cloak class="min-h-screen" dir="rtl">


  <!-- ┌──────────────────────────────────────────┐
       │              START SCREEN                │
       └──────────────────────────────────────────┘ -->
  <div
    x-show="screen === 'start'"
    x-transition:enter="transition ease-out duration-500"
    x-transition:enter-start="opacity-0 scale-95"
    x-transition:enter-end="opacity-100 scale-100"
    x-transition:leave="transition ease-in duration-250"
    x-transition:leave-start="opacity-100 scale-100"
    x-transition:leave-end="opacity-0 scale-95"
    class="relative h-screen flex flex-col items-center justify-center p-5 text-center overflow-hidden"
  >

    <!-- Floating gold stars (decorative) -->
    <span class="star text-2xl" style="top:5%;  left:7%;  animation-duration:3.0s">✦</span>
    <span class="star text-xl"  style="top:12%; left:88%; animation-duration:3.5s">✦</span>
    <span class="star text-3xl" style="top:26%; left:15%; animation-duration:4.0s">✦</span>
    <span class="star text-xl"  style="top:38%; left:82%; animation-duration:3.2s">✦</span>
    <span class="star text-2xl" style="top:52%; left:4%;  animation-duration:4.5s">✦</span>
    <span class="star text-xl"  style="top:65%; left:92%; animation-duration:3.8s">✦</span>
    <span class="star text-3xl" style="top:78%; left:22%; animation-duration:3.3s">✦</span>
    <span class="star text-xl"  style="top:88%; left:68%; animation-duration:4.2s">✦</span>
    <span class="star text-2xl" style="top:9%;  left:50%; animation-duration:4.8s">✦</span>
    <span class="star text-xl"  style="top:93%; left:44%; animation-duration:3.1s">✦</span>

    <!-- Card -->
    <div class="relative z-10 w-full max-w-sm anim-pop-in">

      <!-- Photo circle -->
      <div class="relative mx-auto mb-4 w-40 h-40">
        <div class="relative w-full h-full rounded-full overflow-hidden border-4 border-yellow-400 shadow-lg bg-sky-100 flex items-center justify-center">
          <!-- emoji fallback — shown if main.jpg is missing -->
          <span class="absolute text-5xl select-none z-0">👵</span>
          <!-- profile photo — drop main.jpg into assets/ to activate -->
          <img
            src="assets/main.jpg"
            alt="מרים פרץ"
            class="absolute inset-0 w-full h-full object-cover rounded-full z-10 transition-all duration-300"
            onerror="this.style.display='none'"
          />
        </div>
        <span class="absolute -top-2 -left-2 text-3xl anim-wiggle select-none">🎂</span>
        <span class="absolute -bottom-1 -right-1 text-2xl anim-float select-none">🎉</span>
      </div>

      <!-- Titles -->
      <p class="text-sky-500 font-bold text-base mb-1 tracking-wide">🎊 משחק הטריוויה המיוחד של הנכדים 🎊</p>
      <h1 class="text-4xl font-black text-sky-800 leading-tight mb-1">יום הולדת שמח</h1>
      <h2 class="text-4xl font-black text-yellow-500 mb-3 anim-pulse-glow">מרים פרץ!</h2>

      <p class="text-slate-600 text-base leading-relaxed mb-6 px-1">
        כמה אתם מכירים את הסבתא המדהימה שלכם?<br />
        <span class="font-bold text-sky-700">14 שאלות</span> חכמות מחכות לכם!
      </p>

      <!-- Start button -->
      <button
        @click="startGame()"
        class="w-full bg-gradient-to-r from-yellow-400 to-amber-400 text-sky-900 font-black text-xl py-4 rounded-3xl shadow-xl border-b-4 border-amber-500 active:border-b-0 active:translate-y-1 transition-all duration-150 hover:scale-105 hover:-translate-y-0.5"
      >
        🚀 בואו נתחיל!
      </button>
    </div>
  </div><!-- /start -->


  <!-- ┌──────────────────────────────────────────┐
       │              GAME SCREEN                 │
       └──────────────────────────────────────────┘ -->
  <div
    x-show="screen === 'playing'"
    x-transition:enter="transition ease-out duration-400"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="transition ease-in duration-200"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    class="h-screen flex flex-col items-center py-3 px-4 overflow-hidden"
  >
    <div class="w-full max-w-lg flex flex-col flex-1 min-h-0">

      <!-- Header: label + dot indicators -->
      <div class="flex items-center justify-between mb-2 flex-shrink-0">
        <span class="text-sky-600 font-bold text-sm" x-text="`שאלה ${currentQ + 1} מתוך ${questions.length}`"></span>
        <div class="flex gap-1 items-center">
          <template x-for="(_, i) in questions" :key="i">
            <div
              :class="{
                'w-3 h-3 bg-sky-500 ring-2 ring-sky-300': i === currentQ,
                'w-2 h-2 bg-yellow-400':                  i <  currentQ,
                'w-2 h-2 bg-sky-200':                     i >  currentQ
              }"
              class="rounded-full transition-all duration-300"
            ></div>
          </template>
        </div>
      </div>

      <!-- Gold progress bar -->
      <div class="w-full bg-sky-100 rounded-full h-2 overflow-hidden shadow-inner mb-3 flex-shrink-0">
        <div
          class="h-full rounded-full bg-gradient-to-r from-yellow-400 to-amber-400 transition-all duration-700 ease-out"
          :style="`width: ${((currentQ + 1) / questions.length) * 100}%`"
        ></div>
      </div>

      <!-- Scrollable question area -->
      <div class="flex-1 overflow-y-auto min-h-0">

      <!-- Question card (slides + fades on question change) -->
      <div
        :class="transitioning ? 'opacity-0 translate-x-6' : 'opacity-100 translate-x-0'"
        class="transition-all duration-300"
      >
        <!-- Image collage -->
        <div class="bg-white rounded-t-3xl overflow-hidden shadow-xl border border-sky-100 border-b-0">
          <div class="relative w-full h-36 bg-gradient-to-br from-sky-100 to-amber-50 overflow-hidden">

            <!-- emoji fallback — visible through any slot whose image fails to load -->
            <span
              class="absolute inset-0 flex items-center justify-center text-7xl opacity-20 select-none z-0"
              x-text="questions[currentQ].emoji"
            ></span>

            <!-- 2-photo collage: side by side -->
            <!-- drop 1.jpg … 10.jpg into assets/ to activate; missing ones stay transparent -->
            <div class="absolute inset-0 flex gap-0.5 z-10">

              <!-- left photo -->
              <div class="relative w-1/2 h-full overflow-hidden">
                <img
                  :src="'assets/' + collageImages[0]"
                  :alt="questions[currentQ].imgAlt"
                  class="w-full h-full object-cover"
                  onerror="this.style.opacity='0'"
                />
              </div>

              <!-- right photo -->
              <div class="relative w-1/2 h-full overflow-hidden">
                <img
                  :src="'assets/' + collageImages[1]"
                  :alt="questions[currentQ].imgAlt"
                  class="w-full h-full object-cover"
                  onerror="this.style.opacity='0'"
                />
              </div>

            </div><!-- /collage grid -->

            <!-- soft fade at bottom -->
            <div class="absolute bottom-0 inset-x-0 h-8 bg-gradient-to-t from-white/70 to-transparent pointer-events-none z-20"></div>
          </div>

          <!-- Question text -->
          <div class="px-4 pt-3 pb-3">
            <h2 class="text-xl font-extrabold text-sky-900 leading-snug" x-text="questions[currentQ].q"></h2>
          </div>
        </div>

        <!-- Answer options -->
        <div class="bg-white rounded-b-3xl shadow-xl border border-sky-100 border-t-0 px-4 pb-3 mb-3">
          <div class="flex flex-col gap-2 pt-2">
            <template x-for="(opt, i) in questions[currentQ].opts" :key="i">
              <button
                @click="answer(i)"
                :disabled="selected !== null"
                :class="{
                  'bg-white   border-sky-200 hover:border-sky-400 hover:bg-sky-50 hover:scale-[1.02] active:scale-[0.98]': selected === null,
                  'bg-green-50 border-green-400': selected !== null && i === questions[currentQ].correct,
                  'bg-red-50   border-red-400':   selected !== null && selected === i && i !== questions[currentQ].correct,
                  'bg-gray-50  border-gray-200 opacity-50': selected !== null && selected !== i && i !== questions[currentQ].correct
                }"
                class="w-full flex items-center gap-3 px-3 py-2.5 rounded-2xl border-2 transition-all duration-200 text-right disabled:cursor-default"
              >
                <!-- Letter / check / cross badge -->
                <span
                  :class="{
                    'bg-sky-100   text-sky-600':  selected === null,
                    'bg-green-400 text-white':     selected !== null && i === questions[currentQ].correct,
                    'bg-red-400   text-white':     selected !== null && selected === i && i !== questions[currentQ].correct,
                    'bg-gray-200  text-gray-400':  selected !== null && selected !== i && i !== questions[currentQ].correct
                  }"
                  class="flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center text-sm font-extrabold transition-colors duration-200 select-none"
                  x-text="selected !== null && i === questions[currentQ].correct
                           ? '✓'
                           : (selected !== null && selected === i ? '✗' : ['א','ב','ג','ד'][i])"
                ></span>
                <span class="flex-1 text-base text-slate-700 font-semibold leading-snug" x-text="opt"></span>
              </button>
            </template>
          </div>
        </div>

        <!-- Fun Fact box (appears after answering) -->
        <div
          x-show="selected !== null"
          x-transition:enter="transition ease-out duration-400"
          x-transition:enter-start="opacity-0 translate-y-4"
          x-transition:enter-end="opacity-100 translate-y-0"
          :class="isCorrect ? 'bg-green-50 border-green-300' : 'bg-amber-50 border-amber-300'"
          class="rounded-2xl px-4 py-3 border-2 mb-3"
        >
          <p
            :class="isCorrect ? 'text-green-700' : 'text-amber-700'"
            class="font-extrabold text-sm mb-1"
            x-text="isCorrect ? '🎉 כל הכבוד! תשובה נכונה!' : '😊 לא בדיוק... אבל הנה עובדה מגניבה:'"
          ></p>
          <p class="text-slate-700 text-sm leading-relaxed" x-text="questions[currentQ].fact"></p>
        </div>

        <!-- Next / Results button -->
        <button
          x-show="selected !== null"
          x-transition:enter="transition ease-out duration-300"
          x-transition:enter-start="opacity-0 translate-y-3"
          x-transition:enter-end="opacity-100 translate-y-0"
          @click="next()"
          class="w-full bg-gradient-to-r from-sky-500 to-sky-600 text-white font-black text-lg py-3 rounded-2xl shadow-lg border-b-4 border-sky-700 active:border-b-0 active:translate-y-1 transition-all duration-150 hover:scale-[1.02] mb-3"
          x-text="currentQ === questions.length - 1 ? '🏁 לתוצאות!' : 'שאלה הבאה ←'"
        ></button>

      </div><!-- /question card -->
      </div><!-- /scrollable area -->
    </div>
  </div><!-- /playing -->


  <!-- ┌──────────────────────────────────────────┐
       │             RESULTS SCREEN               │
       └──────────────────────────────────────────┘ -->
  <div
    x-show="screen === 'results'"
    x-transition:enter="transition ease-out duration-500"
    x-transition:enter-start="opacity-0 scale-90"
    x-transition:enter-end="opacity-100 scale-100"
    class="h-screen flex flex-col items-center justify-center p-5 text-center overflow-hidden"
  >
    <div class="w-full max-w-sm anim-pop-in">

      <!-- Medal / trophy -->
      <div class="text-6xl mb-2 select-none anim-wiggle" x-text="medal"></div>

      <h2 class="text-2xl font-black text-sky-800 mb-1">סיימתם! 🎉</h2>
      <p class="text-sky-600 text-lg font-bold mb-3" x-text="scoreTitle"></p>

      <!-- Score card -->
      <div class="bg-white rounded-3xl shadow-xl border-2 border-yellow-300 p-4 mb-3">
        <p class="text-sky-500 font-bold text-sm mb-1">הציון שלכם:</p>

        <div class="flex items-end justify-center gap-1 mb-2">
          <span class="text-6xl font-black text-yellow-500 leading-none" x-text="score"></span>
          <span class="text-3xl font-black text-sky-300 leading-none mb-2" x-text="`/${questions.length}`"></span>
        </div>

        <!-- Animated score bar -->
        <div class="w-full bg-sky-100 rounded-full h-3 overflow-hidden shadow-inner mb-3">
          <div
            class="h-full rounded-full bg-gradient-to-r from-yellow-400 to-amber-400 transition-all duration-1000 ease-out"
            :style="showBar ? `width:${Math.round((score / questions.length) * 100)}%` : 'width:0%'"
          ></div>
        </div>

        <p class="text-slate-700 font-semibold text-sm leading-relaxed" x-text="scoreSubtitle"></p>
      </div>

      <!-- Family photo circle -->
      <div class="relative mx-auto w-24 h-24 mb-4">
        <div class="relative w-full h-full rounded-full overflow-hidden border-4 border-yellow-400 shadow-lg bg-sky-100 flex items-center justify-center">
          <span class="absolute text-4xl select-none z-0">👨‍👩‍👧‍👦</span>
          <img
            src="assets/family.jpg"
            alt="המשפחה"
            class="absolute inset-0 w-full h-full object-cover rounded-full z-10"
            onerror="this.style.opacity='0'"
          />
        </div>
      </div>

      <!-- ★ Hero CTA button ★ -->
      <button
        @click="hugConfetti()"
        class="w-full bg-gradient-to-r from-pink-400 to-rose-400 text-white font-black text-lg py-3 rounded-3xl shadow-xl border-b-4 border-rose-500 active:border-b-0 active:translate-y-1 transition-all duration-150 hover:scale-105 mb-3 leading-snug anim-pulse-glow"
      >
        🤗 עכשיו הולכים לתת לסבתא חיבוק!
      </button>

      <!-- Restart -->
      <button
        @click="restart()"
        class="w-full bg-white text-sky-500 font-bold text-base py-2.5 rounded-2xl border-2 border-sky-200 hover:bg-sky-50 transition-colors"
      >
        🔄 לשחק שוב
      </button>
    </div>
  </div><!-- /results -->

</div><!-- /x-data -->


<!-- ════════════════════════════════════════════════════════════
     Alpine.js game logic
════════════════════════════════════════════════════════════ -->
<script>
  function triviaGame() {
    return {

      // ── State ──────────────────────────────────────────────
      screen:       'start',   // 'start' | 'playing' | 'results'
      currentQ:     0,
      selected:     null,      // index of chosen answer, or null
      score:        0,
      transitioning: false,    // drives the slide-out/in animation between questions
      showBar:      false,     // triggers the animated score bar on results

      // ── Image pool (drop 1.jpg … 10.jpg into assets/ to activate) ──
      assetsImages:  ['1.jpg', '2.jpg', '3.jpg', '4.jpg', '5.jpg',
                      '6.jpg', '7.jpg', '8.jpg', '9.jpg', '10.jpg'],
      collageImages: [],   // 2 randomly-picked filenames for the current question

      // ── Questions ──────────────────────────────────────────
      questions: [
        {
          q:      'באיזו עיר נולדה סבתא מרים?',
          opts:   ['תל אביב', 'קזבלנקה', 'ירושלים', 'חיפה'],
          correct: 1,
          fact:   'סבתא מרים נולדה בקזבלנקה, מרוקו, בשנת 1956 – עיר קסומה על שפת האוקיינוס האטלנטי, מלאה בצבעים, ריחות ומוזיקה!',
          imgAlt: 'מרים בילדותה',
          emoji:  '🌍',
        },
        {
          q:      'באיזה גיל עלתה סבתא מרים לישראל?',
          opts:   ['גיל 3', 'גיל 6', 'גיל 10', 'גיל 14'],
          correct: 1,
          fact:   'בשנת 1962, בגיל שש בלבד, עלתה מרים עם משפחתה לישראל. הם התגוררו במעברת חצרים ליד באר שבע – ומשם התחיל המסע המדהים של המשפחה!',
          imgAlt: 'עלייה לישראל',
          emoji:  '✈️',
        },
        {
          q:      'באיזה יישוב גרה משפחת פרץ לפני הפינוי מסיני?',
          opts:   ['אופירה', 'קצרין', 'אריאל', 'נצרת עילית'],
          correct: 0,
          fact:   'משפחת פרץ גרה ביישוב אופירה שבחצי האי סיני – מקום מרהיב על שפת ים סוף. לאחר הסכם השלום עם מצרים פונה היישוב ב-1982, ולב המשפחה נשאר שם לנצח.',
          imgAlt: 'יישוב אופירה בסיני',
          emoji:  '🏖️',
        },
        {
          q:      'מה הייתה עבודתה של סבתא מרים?',
          opts:   ['רופאה', 'עורכת דין', 'מנהלת בית ספר', 'שחקנית'],
          correct: 2,
          fact:   'מרים הייתה מנהלת בית ספר מסורה ואהובה, שהשפיעה על דורות שלמים של ילדים. כל תלמיד שעבר בפתחה יצא עם ערכים, אהבה ותחושת שייכות!',
          imgAlt: 'בית הספר',
          emoji:  '🏫',
        },
        {
          q:      'איזה פרס יוקרתי קיבלה מרים פרץ ב-2018?',
          opts:   ['פרס נובל', 'פרס ישראל', 'פרס אמת', 'פרס וולף'],
          correct: 1,
          fact:   'ב-2018 קיבלה סבתא מרים את פרס ישראל – הפרס האזרחי הגבוה ביותר במדינה! כולנו גאים בה על כוחה, אמונתה ואהבתה הבלתי נגמרת.',
          imgAlt: 'טקס פרס ישראל',
          emoji:  '🏆',
        },
        {
          q:      'באיזה טקס לאומי הדליקה מרים פרץ משואה?',
          opts:   ['יום הזיכרון', 'יום ירושלים', 'יום העצמאות', 'חנוכה'],
          correct: 2,
          fact:   'בטקס יום העצמאות ה-70 של מדינת ישראל הדליקה סבתא מרים משואה לכבוד כל עם ישראל. רגע מרגש ועוצמתי שאי אפשר לשכוח!',
          imgAlt: 'הדלקת משואה ביום העצמאות',
          emoji:  '🕯️',
        },
        {
          q:      'בשנת 2021 התמודדה מרים פרץ על תפקיד:',
          opts:   ['ראש הממשלה', 'נשיאת המדינה', 'שרת החינוך', 'ראש עיר'],
          correct: 1,
          fact:   'בשנת 2021 התמודדה מרים על נשיאות מדינת ישראל! היא קיבלה תמיכה עצומה מכל קצוות הקשת הפוליטית – כי כולם ראו בה את האם של כולנו.',
          imgAlt: 'מרים פרץ מועמדת לנשיאות',
          emoji:  '🇮🇱',
        },
        {

      // ── Computed getters ───────────────────────────────────
      get isCorrect() {
        return this.selected === this.questions[this.currentQ].correct;
      },

      get medal() {
        const p = this.score / this.questions.length;
        return p === 1 ? '🥇' : p >= 0.85 ? '🥈' : p >= 0.70 ? '🥉' : p >= 0.50 ? '⭐' : '💪';
      },

      get scoreTitle() {
        const p = this.score / this.questions.length;
        if (p === 1)   return '100%! מושלם לחלוטין!';
        if (p >= 0.85) return 'כמעט מושלם!';
        if (p >= 0.70) return 'כל הכבוד!';
        if (p >= 0.50) return 'יפה מאוד!';
        return 'התחלה טובה!';
      },

      get scoreSubtitle() {
        const p = this.score / this.questions.length;
        if (p === 1)   return 'אתם מכירים את סבתא מרים טוב כמוה עצמה 💛';
        if (p >= 0.85) return 'אתם גאוות המשפחה ובטוח גאוות הסבתא!';
        if (p >= 0.70) return 'אתם יודעים המון על הסבתא האגדית שלכם!';
        if (p >= 0.50) return 'שווה לשמוע עוד סיפורים ממרים – היא מרתקת!';
        return 'הסבתא שלכם עשירה בסיפורים – בקשו ממנה לספר!';
      },

      // ── Actions ────────────────────────────────────────────
      init() {
        this.pickCollage();   // pre-warm so first question has images ready
      },

      // Pick 2 distinct random images from assetsImages for the current collage
      pickCollage() {
        const pool  = [...this.assetsImages];
        const picks = [];
        for (let i = 0; i < 2; i++) {
          const idx = Math.floor(Math.random() * pool.length);
          picks.push(pool.splice(idx, 1)[0]);
        }
        this.collageImages = picks;
      },

      startGame() {
        this.pickCollage();
        this.screen = 'playing';
      },

      answer(i) {
        if (this.selected !== null) return;
        this.selected = i;
        if (i === this.questions[this.currentQ].correct) this.score++;
      },

      next() {
        // 1. Slide the card out
        this.transitioning = true;

        setTimeout(() => {
          if (this.currentQ < this.questions.length - 1) {
            // Advance question, pick fresh collage images, then slide card back in
            this.currentQ++;
            this.selected = null;
            this.pickCollage();
            setTimeout(() => { this.transitioning = false; }, 40);
          } else {
            // Show results screen and fire confetti
            this.screen    = 'results';
            this.showBar   = false;
            this.transitioning = false;

            setTimeout(() => {
              this.showBar = true;   // triggers the score bar animation
              this._fireConfetti();
            }, 450);
          }
        }, 280);
      },

      restart() {
        this.currentQ     = 0;
        this.selected     = null;
        this.score        = 0;
        this.showBar      = false;
        this.transitioning = false;
        this.screen       = 'start';
      },

      // Extra confetti burst when the hug button is tapped
      hugConfetti() {
        confetti({
          particleCount: 120,
          spread: 100,
          origin: { y: 0.6 },
          colors: ['#ffd700', '#fb7185', '#38bdf8', '#86efac', '#ffffff'],
        });
      },

      _fireConfetti() {
        const colors  = ['#ffd700', '#38bdf8', '#ffffff', '#fb7185', '#86efac'];
        const endTime = Date.now() + 4500;
        const frame   = () => {
          confetti({ particleCount: 4, angle: 60,  spread: 60, origin: { x: 0 }, colors });
          confetti({ particleCount: 4, angle: 120, spread: 60, origin: { x: 1 }, colors });
          if (Date.now() < endTime) requestAnimationFrame(frame);
        };
        frame();
      },
    };
  }
</script>
